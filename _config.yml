# Jekyll 紫色渐变雨主题配置
title: "我的紫色空间"
description: "一个带有紫色渐变顶栏、侧边栏和白色雨特效的 Jekyll 主题"
url: ""
baseurl: ""

# 主题自定义变量
theme_config:
  header_title: "自定义标题"
