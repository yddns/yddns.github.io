<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/theme.css' | relative_url }}">
</head>
<body>
  <!-- 随机风景图床背景层 -->
  <div class="bg-layer" id="bgLayer"></div>

  <!-- 白色雨特效层 -->
  {% include rain-effect.html %}

  <!-- 紫色渐变顶栏 -->
  {% include header.html %}

  <div class="main-wrapper">
    <!-- 贴紧最左侧的侧边栏 -->
    {% include sidebar.html %}

    <!-- 正文区域 -->
    <main class="content">
      <div class="hero-section">
        <h1 class="hero-title">{{ site.theme_config.header_title | default: site.title }}</h1>
        <p class="hero-subtitle">{{ site.theme_config.header_subtitle | default: site.description }}</p>
      </div>

      <div class="page-content">
        {{ content }}
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-content">
      <a href="https://github.com/yddns/" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg height="32" width="32" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
      <p class="footer-copyright">Copyright © 2026 Yddns All Rights Reserved</p>
    </div>
  </footer>

  <script>
    window.siteConfig = {
      rain_intensity: {{ site.theme_config.rain_intensity | default: 100 }}
    };
  </script>
  <script src="{{ '/assets/js/rain.js' | relative_url }}"></script>
</body>
</html>
